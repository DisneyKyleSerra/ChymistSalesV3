# Netlify Configuration for Static HTML Site

[build]
  # No build command needed - just serve the HTML file directly
  command = ""
  # Publish the root directory where index.html is located
  publish = "."

[build.environment]
  # Skip any npm install or build steps
  SKIP_BUILD = "true"

# Redirect rules for SPA support
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
